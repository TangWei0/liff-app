<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/register.css">
</head>

<body>
    <div class="card">

        <h2>部員登録(初回のみ)</h2>
        <p>お子様のお名前を入力してください。</p>
        <div class="notice">
            <b>入力ルール</b><br><br>

            ・姓と名の間にスペースを入れない<br>
            ・基本は漢字で入力してください。<br>
            ・漢字がない場合はひらがなで入力してください。<br>
            <br>
            例：上田智博
        </div>

        <div id="memberArea">
            <div class="member-row">
                <label>① お子様</label>
                <input class="memberName"
                       type="text"
                       maxlength="20"
                       placeholder="例：上田智博">
            </div>
        </div>

        <button id="btnAdd" class="btn btn-cancel">
            ＋ お子様を追加
        </button>
        <div class="btn-group">
            <button id="btnRegister" class="btn btn-submit">
                登録
            </button>

            <button id="btnCancel" class="btn btn-cancel">
                キャンセル
            </button>
        </div>
    </div>

    <div id="alertModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 id="alertTitle">お知らせ</h3>
            <p id="alertMessage"></p>
            <button onclick="closeAlert()">OK</button>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="../js/liff.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/register.js"></script>
</body>
</html>
