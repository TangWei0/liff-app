<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/register.css">
</head>

<body>
    <div class="card">

        <h2>部員登録</h2>
        <p>お子様のお名前を入力してください。</p>
        <div class="notice">
            <b>入力ルール</b><br><br>

            ・姓と名の間にスペースを入れない<br>
            ・基本は漢字で入力してください。<br>
            ・漢字がない場合はひらがなで入力してください。<br>
            <br>
            例：上田智博
        </div>

        <div id="memberArea">
            <div class="member-row">
                <label>① お子様</label>
                <input class="memberName"
                       type="text"
                       maxlength="20"
                       placeholder="例：上田智博">
            </div>
        </div>

        <button id="btnAdd" class="btn btn-cancel">
            ＋ お子様を追加
        </button>
        <button onclick="register()">
            登録
        </button>
    </div>

    <script src="../js/register.js"></script>
</body>
</html>
