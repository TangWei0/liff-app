<!DOCTYPE html>
<html>
<body>
<h2>登録中...</h2>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
async function main() {
  try {
    document.body.innerHTML = "開始";
    await liff.init({ liffId: "2009873872-wrcf23zq" });
    document.body.innerHTML = "初期化OK";
    
    if (!liff.isInClient()) {
      document.body.innerHTML = "LINEから開いてください";
      return;
    }
    
    if (!liff.isLoggedIn()) {
      document.body.innerHTML = "ログイン中...";
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    const userId = profile.userId;

    document.body.innerHTML = "UserID取得OK<br>" + userId;

    
    await fetch("https://script.google.com/macros/s/AKfycbwYOXKOJuSZXigNtF-DHHnhDtneytW-A-G8YXD1IRyYTsDph0Q7ZShCSNZwdrVN0otN/exec", {
      method: "POST",
      mode: "no-cors",   // ←追加
      headers: { "Content-Type": "application/json"},
      body: JSON.stringify({ userId })});
    
      document.body.innerHTML += "<br>送信完了";
  } catch (e) {
    document.body.innerHTML = "エラー<br>" + e;
  }
}

main();
</script>
</body>
</html>
