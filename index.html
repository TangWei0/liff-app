<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="app"></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>

  // 定義　LIFFIDとGASのURL
  const CONFIG = {
    LIFF_ID: "2009873872-wrcf23zq",
    GAS_URL: "https://script.google.com/macros/s/AKfycbzHwwnfbGH6-QbnluId8uMWg1FpOaKX9jb__EhO7XIoNzaN4Kt41yYExP6QW68Pjxxu/exec"
  };

  async function main() {
  try {
    await initLiff();
    const userId = await getUserId();
    const data = await checkUser(userId);
    handleResponse(data);
    
    // ③ 未登録だけ送信
    //document.body.innerHTML += "<br>送信開始";
    
    //await fetch(gasUrl, {
    //  method: "POST",
    //  mode: "no-cors",   // ←追加
    //  headers: { "Content-Type": "application/json"},
    //  body: JSON.stringify({ userId })});
    
    log("送信完了");
  } catch (e) {
    showError(e);
  }
}

// LIFF初期化
async function initLiff() {
  await liff.init({ liffId: CONFIG.LIFF_ID });  
  if (!liff.isInClient()) { throw new Error("LINEから開いてください"); }
  if (!liff.isLoggedIn()) {
    liff.login();
    throw new Error("ログインリダイレクト");
  }
}

//　ユーザID取得
async function getUserId() {
  const profile = await liff.getProfile();
  const userId = profile.userId;
  if (!userId) { throw new Error("UserID取得失敗"); }
  return userId;
}

//　チェックユーザID（新規か既存か）  
async function checkUser(userId) {
  const res = await fetch(CONFIG.GAS_URL + "?userId=" + userId, { method: "GET" });
  const data = await res.json();
  log("チェック：" + JSON.stringify(data));
  return data;
}

//　ユーザIDチェック　レスポンス処理
function handleResponse(data) {
  if (data.status === "EXISTS") {
    log("既に登録済み");
    return;
  }

  if (data.status === "ERROR") {
    log("エラー：" + data.message);
    return;
  }

  if (data.status === "NEW") {
    log("新規ユーザー");

    const members = data.members || [];
    window.members = members;
    showMemberModal(members);
  }
}

//　異常系処理
function showError(e) {
  console.error(e);
  document.body.innerHTML = "エラー<br>" + e.message;
}
// テスト用　画面表示
function log(msg) {
  document.body.innerHTML += "<br>" + msg;
}

function showMemberModal(members) {
  // 男女分け
  const boys = members.filter(m => m.gender === "男");
  const girls = members.filter(m => m.gender === "女");

  let html = `
  <div class="modal">
    <div class="modal-content">
      <div class="title">
        初期登録<br>
        <span style="font-size:14px; font-weight:normal;">
          該当するお子様（複数可）を選択してください
        </span>
      </div>

      <div class="section boys">
        <div class="section-title">男子</div>
        ${boys.map(m => createCard(m)).join("")}
      </div>

      <div class="section girls">
        <div class="section-title">女子</div>
        ${girls.map(m => createCard(m)).join("")}
      </div>

      <div class="btn-group">
        <button class="btn btn-submit" onclick="submitMembers()">決定</button>
        <button class="btn btn-cancel" onclick="closeLiff()">キャンセル</button>
      </div>
    </div>
  </div>
  `;

  document.getElementById("app").innerHTML = html;
}

function submitMembers() {
  const checked = document.querySelectorAll(".card input:checked");
  const selected = Array.from(checked).map(el => el.value);
  if (selected.length === 0) {
    alert("1人以上選択してください");
    return;
  }
  // 一時保存
  window.selectedMembers = selected;
  // 確認画面へ
  showConfirmModal(selected);
}

async function confirmSubmit() {
  const selected = window.selectedMembers;

  // GASに送る場合👇
  /*
  fetch(CONFIG.GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      userId: "ここにuserId",
      members: selected
    })
  });
  */
}

function backToSelect() {
  if (!window.members) {
    alert("データがありません。URLを一度閉じてから、もう一度開いてください。");
    return;
  }
  showMemberModal(window.members);
}

/* カード生成 */
function createCard(m) {
  return `
    <div class="card" onclick="toggle(this)">
      <span>${m.name}</span>
      <span>${m.grade}</span>
      <input type="checkbox" value="${m.name}" hidden>
    </div>
  `;
}

/* 選択トグル */
function toggle(el) {
  el.classList.toggle("selected");
  const checkbox = el.querySelector("input");
  checkbox.checked = !checkbox.checked;
}

/* 閉じる */
function closeLiff() {
  if (liff.isInClient()) {
    liff.closeWindow();   // ← LINEに戻る（これが本質）
  } else {
    window.location.href = "https://line.me"; // PC確認用
  }
}

function showConfirmModal(selected) {
  let list = selected.map(n => `<li>${n}</li>`).join("");

  let html = `
  <div class="modal">
    <div class="modal-content">
      <div class="title">確認</div>

      <div>以下の内容で登録しますか？</div>
      <ul>${list}</ul>

      <div class="btn-group">
        <button class="btn btn-submit" onclick="confirmSubmit()">OK</button>
        <button class="btn btn-cancel" onclick="backToSelect()">戻る</button>
      </div>
    </div>
  </div>
  `;

  document.getElementById("app").innerHTML = html;
}
  
main();
</script>
</body>
</html>
