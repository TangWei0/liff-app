<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f5f5f5;
}

/* ===== モーダル ===== */
.modal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: white;
  width: 90%;
  max-width: 400px;
  border-radius: 12px;
  padding: 20px;
}

/* ===== タイトル ===== */
.title {
  font-weight: bold;
  margin-bottom: 10px;
}

/* ===== セクション ===== */
.section {
  margin-bottom: 15px;
}

.section-title {
  font-weight: bold;
  margin-bottom: 8px;
}

/* 男子 */
.boys .section-title {
  background: #2e7d32;
  color: white;
  padding: 5px;
  border-radius: 6px;
}

/* 女子 */
.girls .section-title {
  background: #c62828;
  color: white;
  padding: 5px;
  border-radius: 6px;
}

/* ===== カード ===== */
.card {
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  background: white;
  border: 1px solid #ddd;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

.card.selected {
  background: #ff6b00;
  color: white;
}

/* ===== ボタン ===== */
.btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
}

.btn-submit {
  background: #ff6b00;
  color: white;
}

.btn-cancel {
  background: #ccc;
}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>

  // 定義　LIFFIDとGASのURL
  const CONFIG = {
    LIFF_ID: "2009873872-wrcf23zq",
    GAS_URL: "https://script.google.com/macros/s/AKfycbzHwwnfbGH6-QbnluId8uMWg1FpOaKX9jb__EhO7XIoNzaN4Kt41yYExP6QW68Pjxxu/exec"
  };

  async function main() {
  try {
    await initLiff();
    const userId = await getUserId();
    const data = await checkUser(userId);
    handleResponse(data);
    
    // ③ 未登録だけ送信
    //document.body.innerHTML += "<br>送信開始";
    
    //await fetch(gasUrl, {
    //  method: "POST",
    //  mode: "no-cors",   // ←追加
    //  headers: { "Content-Type": "application/json"},
    //  body: JSON.stringify({ userId })});
    
    log("送信完了");
  } catch (e) {
    showError(e);
  }
}

// LIFF初期化
async function initLiff() {
  await liff.init({ liffId: CONFIG.LIFF_ID });  
  if (!liff.isInClient()) { throw new Error("LINEから開いてください"); }
  if (!liff.isLoggedIn()) {
    liff.login();
    throw new Error("ログインリダイレクト");
  }
}

//　ユーザID取得
async function getUserId() {
  const profile = await liff.getProfile();
  const userId = profile.userId;
  if (!userId) { throw new Error("UserID取得失敗"); }
  return userId;
}

//　チェックユーザID（新規か既存か）  
async function checkUser(userId) {
  const res = await fetch(CONFIG.GAS_URL + "?userId=" + userId, { method: "GET" });
  const data = await res.json();
  log("チェック：" + JSON.stringify(data));
  return data;
}

//　ユーザIDチェック　レスポンス処理
function handleResponse(data) {
  if (data.status === "EXISTS") {
    log("既に登録済み");
    return;
  }

  if (data.status === "ERROR") {
    log("エラー：" + data.message);
    return;
  }

  if (data.status === "NEW") {
    log("新規ユーザー");

    const members = data.members || [];
    showMemberModal(members);
  }
}
  
function submitMembers() {
  const checked = document.querySelectorAll('input[name="member"]:checked');
  const selected = Array.from(checked).map(el => el.value);
  log("選択：" + JSON.stringify(selected));
  // GASに送る場合👇
  /*
  fetch(CONFIG.GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      userId: "ここにuserId",
      members: selected
    })
  });
  */
}
  
//　異常系処理
function showError(e) {
  console.error(e);
  document.body.innerHTML = "エラー<br>" + e.message;
}
// テスト用　画面表示
function log(msg) {
  document.body.innerHTML += "<br>" + msg;
}

function showMemberModal(members) {
  // 男女分け
  const boys = members.filter(m => m.gender === "男");
  const girls = members.filter(m => m.gender === "女");

  let html = `
  <div class="modal">
    <div class="modal-content">
      <div class="title">部員選択（複数可）</div>

      <div class="section boys">
        <div class="section-title">男子</div>
        ${boys.map(m => createCard(m)).join("")}
      </div>

      <div class="section girls">
        <div class="section-title">女子</div>
        ${girls.map(m => createCard(m)).join("")}
      </div>

      <button class="btn btn-submit" onclick="submitMembers()">決定</button>
      <button class="btn btn-cancel" onclick="closeModal()">キャンセル</button>
    </div>
  </div>
  `;

  document.getElementById("app").innerHTML = html;
}

/* カード生成 */
function createCard(m) {
  return `
    <div class="card" onclick="toggle(this)">
      <span>${m.name}</span>
      <span>${m.grade}</span>
      <input type="checkbox" value="${m.name}" hidden>
    </div>
  `;
}

/* 選択トグル */
function toggle(el) {
  el.classList.toggle("selected");
  const checkbox = el.querySelector("input");
  checkbox.checked = !checkbox.checked;
}

/* 閉じる */
function closeModal() {
  document.getElementById("app").innerHTML = "";
}
  
main();
</script>
</body>
</html>
