<!DOCTYPE html>
<html>
<body>
<h2>登録中...</h2>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
async function main() {
  try {
    document.body.innerHTML += "開始";
    await liff.init({ liffId: "2009873872-wrcf23zq" });
    document.body.innerHTML += "初期化OK";
    
    if (!liff.isInClient()) {
      document.body.innerHTML += "LINEから開いてください";
      return;
    }
    
    if (!liff.isLoggedIn()) {
      document.body.innerHTML += "ログイン中...";
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    const userId = profile.userId;

    if (!userId) {
      document.body.innerHTML += "<br>UserID取得失敗";
      return;
    }
    
    document.body.innerHTML += "UserID取得OK<br>" + userId;
    
    const gasUrl = "https://script.google.com/macros/s/AKfycbzHwwnfbGH6-QbnluId8uMWg1FpOaKX9jb__EhO7XIoNzaN4Kt41yYExP6QW68Pjxxu/exec";
    // ① 事前チェック
    const checkRes = await fetch(gasUrl + "?userId=" + userId);
    const data = await checkRes.json();   // ←変更
    document.body.innerHTML += "<br>チェック：" + JSON.stringify(data);

    // ② 分岐
    if (data.status === "EXISTS") {
      document.body.innerHTML += "<br>既に登録済み";
      return;
    }
    
    if (data.status === "ERROR") {
      document.body.innerHTML += "<br>エラー：" + data.message;
      return;
    }
    
    if (data.status === "NEW") {
      document.body.innerHTML += "<br>新規ユーザー<br>";
      const members = data.members;
      let html = "<h3>部員一覧</h3><ul>";
      members.forEach(m => {html += `<li>${m[0]}</li>`;});
      html += "</ul>";
      document.body.innerHTML += html;
    }
    
    // ③ 未登録だけ送信
    //document.body.innerHTML += "<br>送信開始";
    
    //await fetch(gasUrl, {
    //  method: "POST",
    //  mode: "no-cors",   // ←追加
    //  headers: { "Content-Type": "application/json"},
    //  body: JSON.stringify({ userId })});
    
      document.body.innerHTML += "<br>送信完了";
  } catch (e) {
    document.body.innerHTML = "エラー<br>" + e;
  }
}

main();
</script>
</body>
</html>
