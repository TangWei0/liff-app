<!DOCTYPE html>
<html>
<body>
<h2>登録中...</h2>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
async function main() {
  try {
    document.body.innerHTML = "開始";

    await liff.init({ liffId: "2009873872-wrcf23zq" });

    document.body.innerHTML = "初期化OK";

    if (!liff.isLoggedIn()) {
      document.body.innerHTML = "ログイン中...";
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    const userId = profile.userId;

    document.body.innerHTML = "UserID取得OK<br>" + userId;

    await fetch("https://script.google.com/macros/s/AKfycbzHwwnfbGH6-QbnluId8uMWg1FpOaKX9jb__EhO7XIoNzaN4Kt41yYExP6QW68Pjxxu/exec", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ userId })
    });

  } catch (e) {
    document.body.innerHTML = "エラー<br>" + e;
  }
}

main();
</script>
</body>
</html>
